<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Ascenso v3 · Pokémon Champions M-4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f16;--bg-2:#11131d;--panel:#171a26;--panel-2:#1d2130;--line:#282d40;--line-soft:#212536;
    --text:#e9ecf5;--muted:#8a92ac;--muted-2:#646c86;
    --keep:#37e29a;--keep-dim:#1c3d31;--swap:#ffb64d;--swap-dim:#3d3018;--cut:#ff5d78;--cut-dim:#3d1c26;
    --cyan:#39d6ff;--violet:#a578ff;--gold:#ffd23f;--radius:14px;--shadow:0 12px 34px -18px rgba(0,0,0,.9);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:radial-gradient(1100px 520px at 82% -8%,rgba(57,214,255,.09),transparent 60%),radial-gradient(900px 480px at 8% 4%,rgba(165,120,255,.10),transparent 55%),var(--bg);
    color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  img{image-rendering:pixelated}
  ::selection{background:var(--cyan);color:#06121a}
  .nav{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px clamp(14px,4vw,44px);
    background:rgba(13,15,22,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .nav .brand{font-family:'Press Start 2P',monospace;font-size:10.5px;letter-spacing:.5px;color:var(--gold);text-shadow:2px 2px 0 rgba(0,0,0,.5);white-space:nowrap}
  .nav .links{display:flex;gap:3px;flex-wrap:wrap;margin-left:auto}
  .nav .links a{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:11.5px;letter-spacing:.3px;color:var(--muted);
    text-decoration:none;padding:6px 9px;border-radius:8px;border:1px solid transparent;transition:.18s;text-transform:uppercase}
  .nav .links a:hover{color:var(--text);border-color:var(--line);background:var(--panel)}
  .langtog{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--panel)}
  .langtog button{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:12px;letter-spacing:.5px;color:var(--muted);
    background:transparent;border:none;padding:6px 12px;cursor:pointer;transition:.15s}
  .langtog button.on{background:var(--cyan);color:#06121a}
  .wrap{max-width:1200px;margin:0 auto;padding:0 clamp(14px,4vw,44px)}
  section{padding:56px 0 12px}
  .eyebrow{font-family:'Press Start 2P',monospace;font-size:9.5px;letter-spacing:1px;color:var(--cyan);margin-bottom:14px;display:inline-block}
  h2.sec{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(25px,4.4vw,40px);line-height:1.05;letter-spacing:.5px;margin-bottom:8px}
  h2.sec .accent{color:var(--cyan)}
  .sec-sub{color:var(--muted);max-width:76ch;margin-bottom:26px;font-size:15px}
  .hero{padding:52px 0 18px}
  .hero .season{display:inline-flex;align-items:center;gap:9px;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:11.5px;
    letter-spacing:1px;text-transform:uppercase;color:var(--gold);border:1px solid var(--line);background:var(--panel);padding:7px 14px;border-radius:999px;margin-bottom:22px}
  .season .dot{width:8px;height:8px;border-radius:50%;background:var(--keep);box-shadow:0 0 10px var(--keep)}
  .hero h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(34px,7.6vw,76px);line-height:.97;letter-spacing:-1px;
    background:linear-gradient(180deg,#fff 30%,#9fb0d6);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:15px}
  .hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p.lede{font-size:clamp(15px,2vw,18px);color:var(--muted);max-width:72ch}
  .chips{display:flex;gap:11px;flex-wrap:wrap;margin-top:26px}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 17px;min-width:104px}
  .chip .big{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:26px;line-height:1}
  .chip .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted-2);margin-top:5px}
  .chip.k .big{color:var(--keep)}.chip.c .big{color:var(--cut)}.chip.s .big{color:var(--swap)}.chip.b .big{color:var(--cyan)}
  .callout{display:flex;gap:13px;align-items:flex-start;background:linear-gradient(90deg,rgba(255,210,63,.09),transparent);
    border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:15px 18px;margin-top:30px}
  .callout .ic{font-size:19px}.callout b{color:var(--gold)}.callout .txt{font-size:14px;color:var(--muted)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.two{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .panel>h3{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px;margin-bottom:3px;display:flex;align-items:center;gap:9px}
  .panel>.ph{font-size:12.5px;color:var(--muted);margin-bottom:15px}
  .wr{display:flex;flex-direction:column;gap:9px}
  .wrrow{display:grid;grid-template-columns:132px 1fr 48px;align-items:center;gap:10px}
  .wrrow .wn{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden}
  .wrrow .wn img{width:26px;height:26px;flex:none}
  .wrrow .track{height:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .wrrow .fill{height:100%;border-radius:999px}
  .wrrow .fill.hi{background:linear-gradient(90deg,#1c8f63,var(--keep))}
  .wrrow .fill.lo{background:linear-gradient(90deg,#54506a,#8a92ac)}
  .wrrow .pct{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;text-align:right}
  .wrrow .pct.hi{color:var(--keep)}.wrrow .pct.lo{color:var(--muted)}
  .usewrap{display:flex;flex-wrap:wrap;gap:7px}
  .upill{display:flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:3px 11px 3px 4px}
  .upill img{width:30px;height:30px;object-fit:contain}
  .upill .r{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:11px;color:var(--muted-2)}
  .upill .un{font-size:12px;font-weight:500}
  .upill.top .r{color:var(--gold)}.upill.top{border-color:rgba(255,210,63,.35)}
  .changes{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
  @media(max-width:820px){.changes{grid-template-columns:1fr}}
  .clist{list-style:none;display:flex;flex-direction:column;gap:9px}
  .clist li{font-size:13.5px;color:var(--muted);padding-left:22px;position:relative}
  .clist li b{color:var(--text)}
  .clist li.up::before{content:"▲";position:absolute;left:0;color:var(--keep);font-size:11px;top:3px}
  .clist li.down::before{content:"▼";position:absolute;left:0;color:var(--cut);font-size:11px;top:3px}
  .clist li.nerf::before{content:"✕";position:absolute;left:0;color:var(--swap);font-size:12px;top:1px}
  .clist li.new::before{content:"✦";position:absolute;left:0;color:var(--violet);font-size:12px;top:2px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .fbtn{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;letter-spacing:.4px;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);padding:8px 15px;border-radius:999px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:7px}
  .fbtn:hover{color:var(--text)}.fbtn .sw{width:9px;height:9px;border-radius:50%}
  .fbtn[data-f="keep"] .sw{background:var(--keep)}.fbtn[data-f="swap"] .sw{background:var(--swap)}
  .fbtn[data-f="cut"] .sw{background:var(--cut)}.fbtn[data-f="new"] .sw{background:var(--cyan)}
  .fbtn[data-f="all"] .sw{background:linear-gradient(90deg,var(--keep),var(--swap),var(--cut))}
  .fbtn.active{color:#06121a;background:var(--text);border-color:var(--text)}
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px}
  .mon{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 8px 10px;text-align:center;
    transition:transform .16s,border-color .16s,box-shadow .16s;overflow:hidden}
  .mon::before{content:"";position:absolute;inset:0 0 auto 0;height:3px}
  .mon.keep::before{background:var(--keep)}.mon.keep{box-shadow:inset 0 0 0 1px rgba(55,226,154,.18)}
  .mon.swap::before{background:var(--swap)}.mon.cut::before{background:var(--cut)}
  .mon:hover{transform:translateY(-4px);border-color:var(--line-soft);box-shadow:var(--shadow)}
  .mon .sprite{width:74px;height:74px;object-fit:contain;margin:0 auto 4px;display:block;transition:transform .2s}
  .mon:hover .sprite{transform:scale(1.14) translateY(-2px)}
  .mon .nm{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:12.5px;line-height:1.15}
  .mon .form{font-size:10px;color:var(--muted-2);margin-top:1px;min-height:12px}
  .mon .tag{margin-top:7px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 7px;border-radius:6px;display:inline-block}
  .mon.keep .tag{background:var(--keep-dim);color:var(--keep)}.mon.swap .tag{background:var(--swap-dim);color:var(--swap)}.mon.cut .tag{background:var(--cut-dim);color:var(--cut)}
  .mon.dim{opacity:.12;filter:grayscale(1);pointer-events:none}
  .mon .badge-new{position:absolute;top:6px;right:6px;font-size:8px;font-weight:800;letter-spacing:.3px;background:var(--cyan);color:var(--bg);border-radius:5px;padding:1px 5px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin:20px 0 4px;font-size:13px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:8px}.legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px}
  @media(max-width:760px){.split{grid-template-columns:1fr}}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .col.cut{border-top:3px solid var(--cut)}.col.keep{border-top:3px solid var(--keep)}
  .col h3{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:19px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .col.cut h3{color:var(--cut)}.col.keep h3{color:var(--keep)}
  .col .hint{font-size:13px;color:var(--muted);margin-bottom:16px}
  .row{display:flex;gap:12px;align-items:center;padding:11px 0;border-top:1px solid var(--line)}
  .row:first-of-type{border-top:none}.row img{width:48px;height:48px;flex:none;object-fit:contain}
  .row .info{flex:1;min-width:0}.row .info .t{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:14.5px}
  .row .info .d{font-size:12.5px;color:var(--muted)}
  .row .verdict{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px;white-space:nowrap;flex:none}
  .col.cut .verdict{background:var(--cut-dim);color:var(--cut)}.col.keep .verdict{background:var(--keep-dim);color:var(--keep)}
  /* recruit / sinistcha */
  .spotlight{background:linear-gradient(135deg,rgba(165,120,255,.12),rgba(57,214,255,.06));border:1px solid var(--line);border-left:3px solid var(--violet);
    border-radius:var(--radius);padding:22px;margin-bottom:18px}
  .spotlight .sh{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .spotlight .sh img{width:56px;height:56px}
  .spotlight .sh h3{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:20px}
  .spotlight .sh .wr-tag{font-size:11px;color:var(--violet);font-weight:700}
  .routes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  @media(max-width:760px){.routes{grid-template-columns:1fr}}
  .route{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .route .rt{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .route.best .rt{color:var(--keep)}.route.alt .rt{color:var(--gold)}
  .route .rtag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:5px}
  .route.best .rtag{background:var(--keep-dim);color:var(--keep)}.route.alt .rtag{background:var(--swap-dim);color:var(--swap)}
  .route ol{margin:8px 0 0 0;padding-left:18px}
  .route li{font-size:13px;color:var(--muted);margin-bottom:6px}
  .route li b{color:var(--text)}
  .recruit-facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:6px}
  .rf{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px;position:relative;overflow:hidden}
  .rf::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan)}
  .rf .rfv{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:19px;color:var(--cyan)}
  .rf .rfl{font-size:12px;color:var(--muted);margin-top:3px}
  /* climb / gauge */
  .gauge-demo{display:flex;flex-direction:column;gap:14px;margin-top:6px}
  .gd{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .gd .gdh{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:9px}
  .gd .gdh .pill{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:5px}
  .gd .gdh .pill.norm{background:var(--panel-2);color:var(--muted)}.gd .gdh .pill.streak{background:var(--keep-dim);color:var(--keep)}
  .bar{display:flex;gap:4px}
  .seg{flex:1;height:16px;border-radius:4px;background:var(--bg-2);border:1px solid var(--line)}
  .seg.f1{background:var(--cyan)}.seg.f2{background:var(--keep)}
  .gd .gnote{font-size:12px;color:var(--muted);margin-top:9px}
  .tips{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
  @media(max-width:760px){.tips{grid-template-columns:1fr}}
  .tip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;display:flex;gap:12px}
  .tip .ti{font-size:20px;flex:none;line-height:1.2}
  .tip .tt{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:14px;margin-bottom:3px}
  .tip .td{font-size:12.5px;color:var(--muted)}
  .tip.cheat{border-color:rgba(255,210,63,.4);background:linear-gradient(90deg,rgba(255,210,63,.06),transparent)}
  .tip.cheat .tt{color:var(--gold)}
  /* teams */
  .slot-intro{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px}
  @media(max-width:760px){.slot-intro{grid-template-columns:1fr}}
  .si{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
  .si .n{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--gold);margin-bottom:9px}
  .si .h{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
  .si .p{font-size:12.5px;color:var(--muted)}
  .team{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
  .team-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .team-head .slotno{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--bg);background:var(--cyan);border-radius:9px;padding:11px 12px;line-height:1}
  .team.rain .slotno{background:#4aa3ff}.team.sun .slotno{background:#ff9f45}
  .team-head .th{flex:1;min-width:200px}
  .team-head .fmt{font-family:'Chakra Petch',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted-2)}
  .team-head h3{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:23px;line-height:1.1}
  .team-head .diff{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 10px;border-radius:7px;align-self:center}
  .diff.easy{background:var(--keep-dim);color:var(--keep)}.diff.mid{background:var(--swap-dim);color:var(--swap)}.diff.hard{background:var(--cut-dim);color:var(--cut)}
  .lineup{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
  @media(max-width:680px){.lineup{grid-template-columns:repeat(3,1fr)}}
  .slotmon{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:10px 6px 8px;text-align:center;position:relative}
  .slotmon.star{border-color:rgba(57,214,255,.45);box-shadow:inset 0 0 0 1px rgba(57,214,255,.25)}
  .slotmon img{width:62px;height:62px;object-fit:contain;display:block;margin:0 auto 3px;animation:bob 3.2s ease-in-out infinite}
  .slotmon:nth-child(2n) img{animation-delay:-1.1s}.slotmon:nth-child(3n) img{animation-delay:-2.2s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .slotmon .snm{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:12px;line-height:1.1}
  .slotmon .srole{font-size:9.5px;color:var(--muted-2);margin-top:2px;min-height:11px}
  .slotmon .flag{position:absolute;top:6px;left:6px;font-size:8px;font-weight:700;letter-spacing:.3px;background:var(--cyan);color:var(--bg);border-radius:5px;padding:1px 5px;text-transform:uppercase}
  .team .strat{font-size:14px;color:var(--muted);border-top:1px solid var(--line);padding-top:14px}
  .team .strat b{color:var(--text)}
  .team .tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .team .tags span{font-size:11px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);padding:4px 10px;border-radius:999px}
  .alt-h{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px;margin:34px 0 4px}
  .alt-sub{font-size:13.5px;color:var(--muted);margin-bottom:18px}
  .altgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:820px){.altgrid{grid-template-columns:1fr}}
  .alt{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .alt .atop{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
  .alt .afmt{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted-2)}
  .alt h4{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px;flex:1;min-width:120px}
  .alt .miniline{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:11px}
  .alt .miniline .mm{position:relative;width:46px;text-align:center}
  .alt .miniline img{width:42px;height:42px;object-fit:contain}
  .alt .miniline .mm.miss img{opacity:.4;filter:grayscale(1)}
  .alt .miniline .mm.miss::after{content:"!";position:absolute;top:-2px;right:6px;color:var(--gold);font-weight:800;font-size:11px}
  .alt .astrat{font-size:12.5px;color:var(--muted)}.alt .astrat b{color:var(--text)}
  .alt .req{font-size:11px;color:var(--gold);margin-top:9px}
  .tier{display:flex;gap:14px;align-items:stretch;margin-bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .tier .badge{flex:none;width:66px;display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:30px}
  .tier.s .badge{background:linear-gradient(160deg,#ffd23f,#ff7a45);color:#2a1400}
  .tier.a .badge{background:linear-gradient(160deg,#a578ff,#5b8bff);color:#0a0620}
  .tier.b .badge{background:linear-gradient(160deg,#39d6ff,#33c48a);color:#022019}
  .tier .mons{display:flex;flex-wrap:wrap;gap:9px;padding:12px 14px;flex:1}
  .tmon{width:64px;text-align:center;position:relative}
  .tmon img{width:52px;height:52px;object-fit:contain}
  .tmon .tn{font-size:9.5px;color:var(--muted);line-height:1.1;margin-top:1px}
  .tmon.own::after{content:"✓";position:absolute;top:-2px;right:6px;font-size:11px;color:var(--keep);font-weight:800;text-shadow:0 0 4px rgba(0,0,0,.8)}
  .tmon.need::after{content:"!";position:absolute;top:-2px;right:8px;font-size:12px;color:var(--gold);font-weight:800}
  .tmon.need img{outline:2px dashed var(--gold);outline-offset:1px;border-radius:8px}
  .costgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
  .cost{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;position:relative;overflow:hidden}
  .cost::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--violet)}
  .cost .cv{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:21px;color:var(--gold)}
  .cost .cl{font-size:12.5px;color:var(--muted);margin-top:3px}.cost .cx{font-size:11px;color:var(--muted-2);margin-top:5px}
  .sysnote{margin-top:16px;font-size:13px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
  .sysnote b{color:var(--text)}
  .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px}
  .item-r{display:flex;align-items:flex-start;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
  .item-r .box{width:16px;height:16px;border:2px solid var(--muted-2);border-radius:4px;flex:none;margin-top:2px}
  .item-r .in .it{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px}
  .item-r .in .iu{font-size:11.5px;color:var(--muted)}
  .item-r .pr{margin-left:auto;font-size:10px;font-weight:700;color:var(--gold);white-space:nowrap;flex:none;align-self:center}
  .build-group{margin-bottom:26px}
  .build-group>.gh{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:15px;letter-spacing:.5px;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .build-group>.gh::before{content:"";width:20px;height:2px;background:var(--cyan)}
  .build{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .build summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:14px;padding:12px 16px}
  .build summary::-webkit-details-marker{display:none}
  .build summary img{width:54px;height:54px;object-fit:contain;flex:none}
  .build summary .bn{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px;flex:1}
  .build summary .bn small{display:block;font-weight:500;font-size:11.5px;color:var(--muted);letter-spacing:.3px}
  .build summary .item{font-size:11.5px;color:var(--gold);background:rgba(255,210,63,.08);border:1px solid var(--line);padding:4px 10px;border-radius:999px;white-space:nowrap}
  .build summary .caret{color:var(--muted-2);transition:.2s;font-size:13px}
  .build[open] summary .caret{transform:rotate(90deg)}
  .build .body{padding:2px 16px 18px;border-top:1px solid var(--line)}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:14px 0}
  .kv .b{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .kv .b .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted-2);margin-bottom:3px}
  .kv .b .v{font-size:13px;font-weight:600;font-family:'Chakra Petch',sans-serif}
  .kv .b .v.gold{color:var(--gold)}
  .moves{display:flex;gap:8px;flex-wrap:wrap}
  .moves span{font-size:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-weight:500}
  .moves span::before{content:"▸ ";color:var(--cyan)}
  .build .note{font-size:13px;color:var(--muted);margin-top:12px;border-left:2px solid var(--line);padding-left:12px}
  .road{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:820px){.road{grid-template-columns:1fr}}
  .phase{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .phase .pn{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--bg);background:var(--cyan);display:inline-block;padding:8px 11px;border-radius:8px;margin-bottom:13px}
  .phase:nth-child(2) .pn{background:var(--gold)}.phase:nth-child(3) .pn{background:var(--violet);color:#fff}
  .phase h4{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:17px;margin-bottom:10px}
  .phase ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .phase li{font-size:13px;color:var(--muted);padding-left:18px;position:relative}
  .phase li::before{content:"→";position:absolute;left:0;color:var(--cyan)}.phase li b{color:var(--text)}
  .phase .thr{margin-top:12px;font-size:12px;color:var(--gold);border-top:1px solid var(--line);padding-top:10px}
  .foot{margin-top:56px;border-top:1px solid var(--line);padding:34px 0 70px}
  .foot h3{font-family:'Chakra Petch',sans-serif;font-size:15px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px}
  .foot ul{list-style:none;display:grid;gap:9px;max-width:84ch}
  .foot li{font-size:12.5px;color:var(--muted-2);padding-left:18px;position:relative}
  .foot li::before{content:"–";position:absolute;left:0;color:var(--line-soft)}
  .foot .src{color:var(--muted)}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  :focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">M-4 · v3</span>
  <div class="links" id="navlinks"></div>
  <div class="langtog"><button data-l="es" class="on">ES</button><button data-l="en">EN</button></div>
</nav>
<div class="wrap">
  <header class="hero" id="top">

    <div class="chips" id="h-chips"></div>

  </header>

  <section id="meta">
    <span class="eyebrow" id="m-eye"></span><h2 class="sec" id="m-title"></h2><p class="sec-sub" id="m-sub"></p>
    <div class="two">
      <div class="panel"><h3 id="m-wr-h"></h3><div class="ph" id="m-wr-p"></div><div class="wr" id="wrBars"></div></div>
      <div class="panel"><h3 id="m-use-h"></h3><div class="ph" id="m-use-p"></div><div class="usewrap" id="useBox"></div>
        <h3 style="margin-top:18px" id="m-arch-h"></h3><div class="ph" id="m-arch-p"></div><div class="usewrap" id="archBox"></div></div>
    </div>
    <div class="changes">
      <div class="panel"><h3 id="m-ch-h"></h3><div class="ph" id="m-ch-p"></div><ul class="clist" id="changeList"></ul></div>
      <div class="panel"><h3 id="m-mg-h"></h3><div class="ph" id="m-mg-p"></div><ul class="clist" id="megaList"></ul></div>
    </div>
  </section>

  <section id="roster">
    <span class="eyebrow" id="r-eye"></span><h2 class="sec" id="r-title"></h2><p class="sec-sub" id="r-sub"></p>
    <div class="filters" id="filters">
      <button class="fbtn active" data-f="all"><span class="sw"></span><span class="fl-all"></span></button>
      <button class="fbtn" data-f="keep"><span class="sw"></span><span class="fl-keep"></span></button>
      <button class="fbtn" data-f="swap"><span class="sw"></span><span class="fl-swap"></span></button>
      <button class="fbtn" data-f="cut"><span class="sw"></span><span class="fl-cut"></span></button>
      <button class="fbtn" data-f="new"><span class="sw"></span><span class="fl-new"></span></button>
    </div>
    <div class="roster" id="rosterGrid"></div>
    <div class="legend" id="r-legend"></div>
  </section>

  <section id="decidir">
    <span class="eyebrow" id="d-eye"></span><h2 class="sec" id="d-title"></h2><p class="sec-sub" id="d-sub"></p>
    <div class="split">
      <div class="col cut"><h3 id="d-cut-h"></h3><p class="hint" id="d-cut-p"></p><div id="cutList"></div></div>
      <div class="col keep"><h3 id="d-keep-h"></h3><p class="hint" id="d-keep-p"></p><div id="keepList"></div></div>
    </div>
  </section>

  <section id="recluta">
    <span class="eyebrow" id="rc-eye"></span><h2 class="sec" id="rc-title"></h2><p class="sec-sub" id="rc-sub"></p>
    <div class="spotlight">
      <div class="sh"><img id="rc-sini-img" alt=""><div><h3 id="rc-sini-h"></h3><span class="wr-tag" id="rc-sini-wr"></span></div></div>
      <p style="font-size:14px;color:var(--muted)" id="rc-sini-why"></p>
      <div class="routes">
        <div class="route best"><div class="rt"><span id="rc-r1-t"></span><span class="rtag" id="rc-r1-tag"></span></div><ol id="rc-r1-steps"></ol></div>
        <div class="route alt"><div class="rt"><span id="rc-r2-t"></span><span class="rtag" id="rc-r2-tag"></span></div><ol id="rc-r2-steps"></ol></div>
      </div>
    </div>
    <div class="recruit-facts" id="recruitFacts"></div>
  </section>

  <section id="master">
    <span class="eyebrow" id="cl-eye"></span><h2 class="sec" id="cl-title"></h2><p class="sec-sub" id="cl-sub"></p>
    <div class="gauge-demo" id="gaugeDemo"></div>
    <div class="tips" id="tipsBox"></div>
  </section>

  <section id="espacios">
    <span class="eyebrow" id="e-eye"></span><h2 class="sec" id="e-title"></h2><p class="sec-sub" id="e-sub"></p>
    <div class="slot-intro" id="slotIntro"></div>
    <div id="teams"></div>
    <h3 class="alt-h" id="alt-h"></h3><p class="alt-sub" id="alt-sub"></p>
    <div class="altgrid" id="altTeams"></div>
  </section>

  <section id="top40">
    <span class="eyebrow" id="t-eye"></span><h2 class="sec" id="t-title"></h2><p class="sec-sub" id="t-sub"></p>
    <div id="tiers"></div>
  </section>

  <section id="sistema">
    <span class="eyebrow" id="s-eye"></span><h2 class="sec" id="s-title"></h2><p class="sec-sub" id="s-sub"></p>
    <div class="costgrid" id="costGrid"></div><div class="sysnote" id="sysNote"></div>
  </section>

  <section id="compras">
    <span class="eyebrow" id="c-eye"></span><h2 class="sec" id="c-title"></h2><p class="sec-sub" id="c-sub"></p>
    <div class="shop" id="shopList"></div>
  </section>

  <section id="builds">
    <span class="eyebrow" id="b-eye"></span><h2 class="sec" id="b-title"></h2><p class="sec-sub" id="b-sub"></p>
    <div id="buildsWrap"></div>
  </section>

  <section id="plan">
    <span class="eyebrow" id="p-eye"></span><h2 class="sec" id="p-title"></h2><p class="sec-sub" id="p-sub"></p>
    <div class="road" id="roadmap"></div>
  </section>

  <footer class="foot"><h3 id="f-h"></h3><ul id="footList"></ul></footer>
</div>

/* ============ RENDER ============ */
function render(){
  document.documentElement.lang=L;
  // nav
  document.getElementById('navlinks').innerHTML=D.nav[L].map((x,i)=>`<a href="#${D.navIds[i]}">${x}</a>`).join('');
  // hero
  document.getElementById('h-season').textContent=tt(D.season);
  const T=D.title[L];document.getElementById('h-title').innerHTML=`${T[0]}<em>${T[1]}</em>${T[2]}`;
  document.getElementById('h-lede').textContent=tt(D.lede);
  document.getElementById('h-chips').innerHTML=D.chips[L].map(c=>`<div class="chip ${c[2]}"><div class="big">${c[0]}</div><div class="lbl">${c[1]}</div></div>`).join('');
  document.getElementById('h-callout').innerHTML=tt(D.callout);
  // meta
  setEye('m',D.m);
  document.getElementById('m-wr-h').textContent=tt(D.m.wrH);document.getElementById('m-wr-p').textContent=tt(D.m.wrP);
  document.getElementById('m-use-h').textContent=tt(D.m.useH);document.getElementById('m-use-p').textContent=tt(D.m.useP);
  document.getElementById('m-arch-h').textContent=tt(D.m.archH);document.getElementById('m-arch-p').textContent=tt(D.m.archP);
  document.getElementById('m-ch-h').textContent=tt(D.m.chH);document.getElementById('m-ch-p').textContent=tt(D.m.chP);
  document.getElementById('m-mg-h').textContent=tt(D.m.mgH);document.getElementById('m-mg-p').textContent=tt(D.m.mgP);
  document.getElementById('wrBars').innerHTML=D.winrates.map(w=>{const hi=w[2]>=50;const wd=Math.round((w[2]-40)/16*100);
    return `<div class="wrrow"><div class="wn">${img(w[1])}${w[0]}</div><div class="track"><div class="fill ${hi?'hi':'lo'}" style="width:${wd}%"></div></div><div class="pct ${hi?'hi':'lo'}">${w[2]}%</div></div>`;}).join('');
  document.getElementById('useBox').innerHTML=D.usage.map((m,i)=>`<div class="upill ${i<3?'top':''}"><span class="r">${i+1}</span>${img(m[1])}<span class="un">${m[0]}</span></div>`).join('');
  document.getElementById('archBox').innerHTML=D.arch[L].map(m=>`<div class="upill">${img(m[1])}<span class="un">${m[0]}</span></div>`).join('');
  document.getElementById('changeList').innerHTML=D.changes[L].map(c=>`<li class="${c[0]}">${c[1]}</li>`).join('');
  document.getElementById('megaList').innerHTML=D.megas[L].map(c=>`<li class="${c[0]}">${c[1]}</li>`).join('');
  // roster
  setEye('r',D.r);
  document.querySelector('.fl-all').textContent=D.filters[L][0];document.querySelector('.fl-keep').textContent=D.filters[L][1];
  document.querySelector('.fl-swap').textContent=D.filters[L][2];document.querySelector('.fl-cut').textContent=D.filters[L][3];document.querySelector('.fl-new').textContent=D.filters[L][4];
  document.getElementById('rosterGrid').innerHTML=roster.map(m=>`<div class="mon ${m[3]}" data-s="${m[3]}" data-new="${m[5]?1:0}">
    ${m[5]===1?`<span class="badge-new">${L==='es'?'NUEVO':'NEW'}</span>`:''}${img(m[1],'sprite')}
    <div class="nm">${m[0].replace('-','')}</div><div class="form">${m[2]?tt(m[2]):''}</div><span class="tag">${tt(m[4])}</span></div>`).join('');
  const lg=D.r.legend[L];document.getElementById('r-legend').innerHTML=
    `<span><i style="background:var(--keep)"></i>${lg[0]}</span><span><i style="background:var(--swap)"></i>${lg[1]}</span><span><i style="background:var(--cut)"></i>${lg[2]}</span>`;
  bindFilters();
  // decidir
  setEye('d',D.d);
  document.getElementById('d-cut-h').textContent=tt(D.d.cutH);document.getElementById('d-cut-p').textContent=tt(D.d.cutP);
  document.getElementById('d-keep-h').textContent=tt(D.d.keepH);document.getElementById('d-keep-p').textContent=tt(D.d.keepP);
  document.getElementById('cutList').innerHTML=D.cut[L].map(m=>`<div class="row">${img(m[1])}<div class="info"><div class="t">${m[0]}</div><div class="d">${m[2]}</div></div><span class="verdict">${m[3]}</span></div>`).join('');
  document.getElementById('keepList').innerHTML=D.keep[L].map(e=>`<div class="row">${img(e[1])}<div class="info"><div class="t">${e[0]}</div><div class="d">${e[2]}</div></div><span class="verdict">${e[3]}</span></div>`).join('');
  // recluta
  setEye('rc',D.rc);
  document.getElementById('rc-sini-img').src=S(1013);
  document.getElementById('rc-sini-h').textContent=tt(D.rc.siniH);document.getElementById('rc-sini-wr').textContent=tt(D.rc.siniWR);
  document.getElementById('rc-sini-why').textContent=tt(D.rc.siniWhy);
  document.getElementById('rc-r1-t').textContent=tt(D.rc.r1t);document.getElementById('rc-r1-tag').textContent=tt(D.rc.r1tag);
  document.getElementById('rc-r1-steps').innerHTML=D.rc.r1[L].map(s=>`<li>${s}</li>`).join('');
  document.getElementById('rc-r2-t').textContent=tt(D.rc.r2t);document.getElementById('rc-r2-tag').textContent=tt(D.rc.r2tag);
  document.getElementById('rc-r2-steps').innerHTML=D.rc.r2[L].map(s=>`<li>${s}</li>`).join('');
  document.getElementById('recruitFacts').innerHTML=D.rc.facts[L].map(f=>`<div class="rf"><div class="rfv">${f[0]}</div><div class="rfl">${f[1]}</div></div>`).join('');
  // master
  setEye('cl',D.cl);
  document.getElementById('gaugeDemo').innerHTML=D.cl.gauge.map(g=>{
    const segs=Array.from({length:4},(_,i)=>`<div class="seg ${i<g.fill?('f'+g.fill):''}"></div>`).join('');
    return `<div class="gd"><div class="gdh">${tt(g.h)}<span class="pill ${g.cls}">${tt(g.pill)}</span></div><div class="bar">${segs}</div><div class="gnote">${tt(g.note)}</div></div>`;}).join('');
  document.getElementById('tipsBox').innerHTML=D.cl.tips[L].map(t=>`<div class="tip ${t[3]?'cheat':''}"><span class="ti">${t[0]}</span><div><div class="tt">${t[1]}</div><div class="td">${t[2]}</div></div></div>`).join('');
  // espacios
  setEye('e',D.e);
  document.getElementById('slotIntro').innerHTML=D.e.slotIntro[L].map(s=>`<div class="si"><div class="n">${s[0]}</div><div class="h">${s[1]}</div><div class="p">${s[2]}</div></div>`).join('');
  document.getElementById('teams').innerHTML=D.teams.map(t=>`<div class="team ${t.cls}"><div class="team-head"><div class="slotno">${t.slot}</div>
    <div class="th"><div class="fmt">${tt(t.fmt)}</div><h3>${tt(t.name)}</h3></div><span class="diff ${t.diff[0]}">${tt(t.diff[1])}</span></div>
    <div class="lineup">${t.mons.map(m=>`<div class="slotmon ${m.star?'star':''}">${m.flag?`<span class="flag">${tt(m.flag)}</span>`:''}${img(m.id)}<div class="snm">${m.n}</div><div class="srole">${tt(m.r)}</div></div>`).join('')}</div>
    <div class="strat">${tt(t.strat)}</div><div class="tags">${t.tags[L].map(x=>`<span>${x}</span>`).join('')}</div></div>`).join('');
  document.getElementById('alt-h').textContent=tt(D.e.altH);document.getElementById('alt-sub').textContent=tt(D.e.altSub);
  document.getElementById('altTeams').innerHTML=D.altTeams.map(a=>`<div class="alt"><div class="atop"><h4>${tt(a.n)}</h4><span class="afmt">${tt(a.fmt)}</span></div>
    <div class="miniline">${a.mons.map(m=>`<div class="mm ${a.miss.includes(m[0])?'miss':''}">${img(m[0])}</div>`).join('')}</div>
    <div class="astrat">${tt(a.s)}</div>${a.req?`<div class="req">${tt(a.req)}</div>`:''}</div>`).join('');
  // top40
  setEye('t',D.t);
  document.getElementById('tiers').innerHTML=tierRow('S','s',D.tierS)+tierRow('A','a',D.tierA)+tierRow('B','b',D.tierB);
  // sistema
  setEye('s',D.s);
  document.getElementById('costGrid').innerHTML=D.costs[L].map(c=>`<div class="cost"><div class="cv">${c[0]}</div><div class="cl">${c[1]}</div><div class="cx">${c[2]}</div></div>`).join('');
  document.getElementById('sysNote').innerHTML=tt(D.sysNote);
  // compras
  setEye('c',D.c);
  document.getElementById('shopList').innerHTML=D.shop[L].map(s=>`<div class="item-r"><span class="box"></span><div class="in"><div class="it">${s[0]} · ${s[1]}</div><div class="iu">${s[2]}</div></div><span class="pr">${s[3]}</span></div>`).join('');
  // builds
  setEye('b',D.b);
  document.getElementById('buildsWrap').innerHTML=builds.map(g=>`<div class="build-group"><div class="gh">${D.buildGroups[L][g[0]]}</div>
    ${g[1].map(b=>`<details class="build"><summary>${img(b.id)}<span class="bn">${b.n}<small>${b.ab}</small></span><span class="item">${b.item}</span><span class="caret">▶</span></summary>
    <div class="body"><div class="kv">
      <div class="b"><div class="k">${L==='es'?'Naturaleza':'Nature'}</div><div class="v">${b.nat}</div></div>
      <div class="b"><div class="k">${L==='es'?'Puntos de Característica':'Stat Points'}</div><div class="v">${b.sp}</div></div>
      <div class="b"><div class="k">${L==='es'?'Habilidad':'Ability'}</div><div class="v">${b.ab}</div></div>
      <div class="b"><div class="k">${L==='es'?'Objeto':'Item'}</div><div class="v gold">${b.item}</div></div></div>
    <div class="moves">${b.mv.map(m=>`<span>${m}</span>`).join('')}</div><div class="note">${tt(b.note)}</div></div></details>`).join('')}</div>`).join('');
  // plan
  setEye('p',D.p);
  document.getElementById('roadmap').innerHTML=D.road[L].map((p,i)=>`<div class="phase"><span class="pn">0${i+1}</span><h4>${p[0]}</h4>
    <ul>${p[1].map(x=>`<li>${x}</li>`).join('')}</ul><div class="thr">${p[2]}</div></div>`).join('');
  // foot
  document.getElementById('f-h').textContent=L==='es'?'NOTAS Y FUENTES':'NOTES & SOURCES';
  document.getElementById('footList').innerHTML=D.foot[L].map(x=>`<li>${x}</li>`).join('');
}
function setEye(pre,o){document.getElementById(pre+'-eye').textContent=tt(o.eye);
  const T=o.title[L];document.getElementById(pre+'-title').innerHTML=`${T[0]}<span class="accent">${T[1]}</span>`;
  document.getElementById(pre+'-sub').textContent=tt(o.sub);}
function tierRow(letter,cls,arr){return `<div class="tier ${cls}"><div class="badge">${letter}</div><div class="mons">${arr.map(m=>`<div class="tmon ${m[2]?'own':''} ${m[3]?'need':''}">${img(m[1])}<div class="tn">${m[0]}</div></div>`).join('')}</div></div>`;}
function bindFilters(){const fb=[...document.querySelectorAll('.fbtn')];fb.forEach(b=>b.onclick=()=>{fb.forEach(x=>x.classList.remove('active'));b.classList.add('active');
  const f=b.dataset.f;document.querySelectorAll('#rosterGrid .mon').forEach(el=>{let show=f==='all'||(f==='new'?el.dataset.new==='1':el.dataset.s===f);el.classList.toggle('dim',!show);});});}
document.querySelectorAll('.langtog button').forEach(b=>b.onclick=()=>{L=b.dataset.l;document.querySelectorAll('.langtog button').forEach(x=>x.classList.toggle('on',x===b));render();});
render();
</script>
